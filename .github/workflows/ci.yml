name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  racx:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: racx
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...

  racd:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: racd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy src
      - run: pytest
